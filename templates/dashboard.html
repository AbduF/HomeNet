<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetGuard Dashboard</title>
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #22c55e;
            --radius: 8px;
            --font-en: 'Segoe UI', sans-serif;
            --font-ar: 'Tajawal', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-en);
            padding: 20px;
            min-height: 100vh;
            transition: direction 0.3s ease;
        }
        body[lang="ar"] { font-family: var(--font-ar); direction: rtl; text-align: right; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 10px; }
        .brand { font-size: 1.5rem; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .header-actions button {
            background: var(--bg-card); color: var(--text-muted); border: 1px solid #334155;
            padding: 8px 15px; border-radius: 6px; cursor: pointer; margin-left: 5px;
        }
        body[lang="ar"] .header-actions button { margin-left: 0; margin-right: 5px; }
        .header-actions button:hover { background: #334155; color: white; }
        .btn-logout { border-color: var(--danger) !important; color: var(--danger) !important; }

        .container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--bg-card); padding: 20px; border-radius: var(--radius); border: 1px solid #334155; }
        .card h3 { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 10px; text-transform: uppercase; }
        .value { font-size: 2rem; font-weight: bold; color: var(--primary); }
        
        .control-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .url-input-row { display: flex; gap: 10px; margin-top: 10px; }
        input[type="text"] { background: #334155; border: 1px solid #475569; color: white; padding: 8px; border-radius: 4px; flex: 1; }
        .btn-action { background: var(--primary); border: none; color: white; padding: 0 15px; border-radius: 4px; cursor: pointer; }
        
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }
        body[lang="ar"] input:checked + .slider:before { transform: translateX(-20px); left: auto; right: 3px; }
        
        .url-list { margin-top: 15px; max-height: 100px; overflow-y: auto; font-size: 0.8rem; color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">🛡️ NetGuard</div>
        <div class="header-actions">
            <button onclick="toggleLang()" id="langBtn">English / العربية</button>
            <button onclick="changePasswordPrompt()">Change Password</button>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h3 data-i18n="status">System Status</h3>
            <div id="sysStatus" style="color: var(--success); font-weight: bold;">Active</div>
            <div style="margin-top: 5px; color: var(--text-muted); font-size: 0.8rem;" id="scheduleText">22:00 - 05:00</div>
        </div>

        <div class="card">
            <h3 data-i18n="hosts">Connected Hosts</h3>
            <div class="value" id="hostCount">0</div>
        </div>
        <div class="card">
            <h3 data-i18n="speed">Download Speed</h3>
            <div class="value"><span id="dlSpeed">0</span> <small>Mbps</small></div>
        </div>

        <div class="card" style="grid-column: 1 / -1;">
            <h3 data-i18n="controls">Access Controls</h3>
            <div class="control-row">
                <span data-i18n="blockSocial">Block Social Media</span>
                <label class="switch"><input type="checkbox" checked onchange="toggleRule()"><span class="slider"></span></label>
            </div>
            <div style="margin-top: 20px; border-top: 1px solid #334155; padding-top: 15px;">
                <h4 data-i18n="manualBlockTitle">Manual URL Blocking</h4>
                <div class="url-input-row">
                    <input type="text" id="urlInput" placeholder="e.g. badsite.com">
                    <button class="btn-action" onclick="addManualBlock()">Block</button>
                </div>
                <div class="url-list" id="blockedUrlsList"></div>
            </div>
        </div>
    </div>

    <script>
        const i18n = {
            en: { status: "System Status", hosts: "Connected Hosts", speed: "Download Speed", controls: "Access Controls", blockSocial: "Block Social Media", manualBlockTitle: "Manual URL Blocking", addSuccess: "Site Added!", addFail: "Failed to add." },
            ar: { status: "حالة النظام", hosts: "الأجهزة المتصلة", speed: "سرعة التنزيل", controls: "التحكم في الوصول", blockSocial: "حجب التواصل", manualBlockTitle: "حجب يدوي لموقع", addSuccess: "تمت الإضافة!", addFail: "فشل الإضافة." }
        };
        let lang = localStorage.getItem('homenet_lang') || 'en';
        
        function applyLanguage() {
            document.body.lang = lang;
            document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                if(i18n[lang][el.dataset.i18n]) el.innerText = i18n[lang][el.dataset.i18n];
            });
            document.getElementById('langBtn').innerText = lang === 'en' ? 'English / العربية' : 'العربية / English';
        }
        function toggleLang() {
            lang = lang === 'en' ? 'ar' : 'en';
            localStorage.setItem('homenet_lang', lang);
            applyLanguage();
        }
        async function logout() { await fetch('/api/logout', {method: 'POST'}); window.location.href = '/login'; }
        function changePasswordPrompt() {
            const oldP = prompt("Old Password"); const newP = prompt("New Password");
            if(oldP && newP) {
                fetch('/api/change_password', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: 'admin', old_password: oldP, new_password: newP}) })
                .then(r => r.json()).then(d => alert(d.success ? 'Password Updated Successfully' : 'Update Failed'));
            }
        }
        function toggleRule() { fetch('/api/toggle_rule', {method: 'POST'}); }
        async function addManualBlock() {
            const url = document.getElementById('urlInput').value; if(!url) return;
            const res = await fetch('/api/add_block', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({url: url}) });
            const data = await res.json(); alert(data.success ? i18n[lang].addSuccess : data.message || i18n[lang].addFail);
            if(data.success) document.getElementById('urlInput').value = ''; updateStatus();
        }
        async function updateStatus() {
            try {
                const res = await fetch('/api/status');
                if(res.status === 403) { window.location.href = '/login'; return; }
                const data = await res.json();
                document.getElementById('hostCount').innerText = data.hosts;
                document.getElementById('dlSpeed').innerText = data.dl_speed;
                document.getElementById('scheduleText').innerText = data.schedule;
                const statusEl = document.getElementById('sysStatus');
                if(data.status === 'Blocked') { statusEl.innerText = "Blocked / محجوب"; statusEl.style.color = "var(--danger)"; }
                else { statusEl.innerText = "Active / نشط"; statusEl.style.color = "var(--success)"; }
                document.getElementById('blockedUrlsList').innerHTML = data.blocked_urls.map(u => `<div>- ${u}</div>`).join('');
            } catch(e) { console.error(e); }
        }
        applyLanguage(); updateStatus(); setInterval(updateStatus, 2000);
    </script>
</body>
</html>
