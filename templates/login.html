{% extends "base.html" %}

{% block title %}{{ translations.login }} - HomeNet{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 5rem auto;">
    <h2 class="text-center mb-2">{{ translations.login }}</h2>
    {% if error %}
    <div class="alert alert-error mb-2">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/login">
        <div class="form-group">
            <label for="username">{{ translations.username }}</label>
            <input type="text" id="username" name="username" placeholder="{{ translations.username }}" required>
        </div>
        <div class="form-group">
            <label for="password">{{ translations.password }}</label>
            <input type="password" id="password" name="password" placeholder="{{ translations.password }}" required>
        </div>
        <button type="submit" class="btn w-100">{{ translations.submit }}</button>
    </form>
</div>
{% endblock %}
