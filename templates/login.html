<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NetGuard</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .login-card {
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }
        h2 { margin-bottom: 1.5rem; color: #3b82f6; }
        .input-group { margin-bottom: 1rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; color: #94a3b8; font-size: 0.9rem; }
        input {
            width: 100%; padding: 10px;
            background: #334155; border: 1px solid #475569;
            color: white; border-radius: 6px; box-sizing: border-box;
        }
        .btn {
            background: #3b82f6; color: white;
            border: none; padding: 12px;
            border-radius: 6px; cursor: pointer; width: 100%;
            font-size: 1rem; font-weight: bold; margin-top: 1rem;
        }
        .btn:hover { background-color: #2563eb; }
        .error { color: #ef4444; margin-top: 10px; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🛡️ NetGuard</h2>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="admin">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="123456">
        </div>
        <button class="btn" onclick="handleLogin()">Login</button>
        <div id="errorMsg" class="error">Invalid username or password</div>
    </div>

    <script>
        async function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const btn = document.querySelector('.btn');
            btn.innerText = "Logging in...";
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });
                const data = await res.json();
                if(data.success) {
                    window.location.href = '/dashboard';
                } else {
                    document.getElementById('errorMsg').style.display = 'block';
                    btn.innerText = "Login";
                }
            } catch (e) {
                console.error(e);
                btn.innerText = "Login";
            }
        }
    </script>
</body>
</html>
