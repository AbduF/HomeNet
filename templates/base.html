<!DOCTYPE html>
<html lang="{{ config.get('settings', {}).get('language', 'en') }}" dir="{{ 'rtl' if config.get('settings', {}).get('language') == 'ar' else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeNet - {% block title %}Controller{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</head>
<body>
    {% if session.get('logged_in') %}
    <nav class="navbar">
        <div class="nav-brand">🌐 HomeNet <span class="badge">UAE</span></div>
        <div class="nav-links">
            <a href="{{ url_for('dashboard') }}">{{ i18n.get('dashboard', 'Dashboard') }}</a>
            <a href="{{ url_for('logout') }}">{{ i18n.get('logout', 'Logout') }}</a>
        </div>
    </nav>
    {% endif %}
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    
    <footer class="footer">
        <p>🇦🇪 Proudly developed in UAE / Al Ain | Support: abdalfaqeeh@gmail.com</p>
    </footer>
</body>
</html>
