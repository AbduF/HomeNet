<!DOCTYPE html>
<html lang="{{ 'ar' if g.lang == 'ar' else 'en' }}" dir="{{ 'rtl' if g.lang == 'ar' else 'ltr' }}" data-theme="{{ 'dark' if request.cookies.get('theme') == 'dark' else 'light' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HomeNet - Parental Network Controller">
    <title>{% block title %}HomeNet{% endblock %}</title>

    <!-- Load Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Load Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Load External CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Inline Critical CSS (for faster loading) -->
    <style>
        /* Prevent FOUC (Flash of Unstyled Content) */
        body { visibility: hidden; }
        body.loaded { visibility: visible; }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body class="loaded">
    <!-- Theme Toggle -->
    <div class="theme-toggle">
        <input type="checkbox" id="theme-toggle-input" {% if request.cookies.get('theme') == 'dark' %}checked{% endif %}>
        <label for="theme-toggle-input">
            <span class="sun">☀️</span>
            <span class="moon">🌙</span>
        </label>
    </div>

    <!-- Language Switcher -->
    <div class="language-switcher">
        <a href="?lang=en">English</a> | <a href="?lang=ar">العربية</a>
    </div>

    <div class="container">
        <div class="header">
            <div class="logo">HomeNet</div>
            {% block header_actions %}{% endblock %}
        </div>
        {% block content %}{% endblock %}
    </div>

    <!-- Theme Toggle Script -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.getElementById('theme-toggle-input');
            const html = document.documentElement;

            // Set initial theme
            const currentTheme = html.getAttribute('data-theme');
            themeToggle.checked = currentTheme === 'dark';

            // Toggle theme
            themeToggle.addEventListener('change', function() {
                const newTheme = this.checked ? 'dark' : 'light';
                html.setAttribute('data-theme', newTheme);
                document.cookie = `theme=${newTheme}; path=/; max-age=${60 * 60 * 24 * 365}`; // 1 year
            });
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
