# HomeNet Service Configuration
# Format: KEY=VALUE (no spaces around '=', no quotes)
# Used by systemd as EnvironmentFile & optionally by Python app

# ─── Network Interface ───────────────────────────────────────────────
# Change to wlan0 for Wi-Fi, eth0 for Ethernet, or auto for detection
INTERFACE=eth0

# ─── Logging ────────────────────────────────────────────────────────
LOG_LEVEL=INFO
LOG_DIR=/var/log/homenetservice

# ─── Data & Database Paths ───────────────────────────────────────────
DATA_DIR=/var/lib/homenetservice
DB_FILE=/var/lib/homenetservice/homenetservice.db
CONFIG_FILE=/var/lib/homenetservice/homenetservice.json

# ─── Service Intervals (seconds) ─────────────────────────────────────
SCAN_INTERVAL=60
TRAFFIC_CHECK_INTERVAL=300
TIME_BLOCK_CHECK_INTERVAL=30

# ─── Firewall Backend ────────────────────────────────────────────────
# Options: auto, iptables, nftables
FIREWALL_BACKEND=auto

# ─── Alert & Monitoring ──────────────────────────────────────────────
ENABLE_DESKTOP_NOTIFICATIONS=true
ENABLE_EMAIL_ALERTS=false
HIGH_TRAFFIC_THRESHOLD_MB=500

# ─── Email Configuration (if ENABLE_EMAIL_ALERTS=true) ───────────────
SMTP_HOST=smtp.gmail.com
SMTP_PORT=587
SMTP_USER=
SMTP_PASS=
ALERT_EMAIL=

# ─── Performance & Debug ─────────────────────────────────────────────
ENABLE_DEBUG=false
MAX_HOSTS_CACHE=500
TRAFFIC_HISTORY_DAYS=30